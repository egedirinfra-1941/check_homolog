name: Execute check_homolog script

on:
  schedule:
    - cron: "0 12 * * 1-5"  # Executa todo dia às 13:00 UTC (ajuste para seu fuso horário)
  workflow_dispatch:  # Permite execução manual

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Atualizar lista de pacotes
        run: sudo apt-get update
     
      - name: Executar o script
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GSHEET_CRED: ${{ secrets.GSHEET_CRED }}
          GSHEET_KEY_SHEET: ${{ secrets.GSHEET_KEY_SHEET }}
          JSON_KEY: ${{ secrets.JSON_KEY }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          RECEIVER_EMAIL2: ${{ secrets.RECEIVER_EMAIL2 }}
          RECEIVER_EMAIL3: ${{ secrets.RECEIVER_EMAIL3 }}
          RECEIVER_EMAIL4: ${{ secrets.RECEIVER_EMAIL4 }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: python homolog.py
